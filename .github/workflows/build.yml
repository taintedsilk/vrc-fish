name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install VS 2026 C++ Build Tools (v145)
        run: |
          choco install visualstudio2026buildtools --package-parameters "--add Microsoft.VisualStudio.Component.VC.Tools.x86.x64" -y
        shell: pwsh

      - name: Build Release x64
        run: |
          msbuild vrc-fish.sln `
            /p:Configuration=Release `
            /p:Platform=x64
        shell: pwsh

      - name: Prepare release package
        run: |
          $tag = "${{ github.ref_name }}"
          $staging = "dist\vrc-fish-$tag"

          New-Item -ItemType Directory -Force $staging | Out-Null

          Copy-Item .\vrc-fish.exe, .\config.ini, `
            .\opencv_core460.dll, .\opencv_highgui460.dll, .\opencv_imgcodecs460.dll, `
            .\opencv_imgproc460.dll, .\opencv_videoio460.dll `
            -Destination $staging -Force

          Copy-Item .\Resource-VRChat -Destination $staging -Recurse -Force
          Copy-Item .\lang -Destination $staging -Recurse -Force
        shell: pwsh

      - name: Create ZIP archive
        run: |
          $tag = "${{ github.ref_name }}"
          Push-Location dist
          Compress-Archive -Path ".\vrc-fish-$tag" -DestinationPath "..\vrc-fish-$tag.zip" -Force
          Pop-Location
        shell: pwsh

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: vrc-fish-${{ github.ref_name }}
          path: dist/vrc-fish-${{ github.ref_name }}/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: vrc-fish-${{ github.ref_name }}.zip
          generate_release_notes: true
